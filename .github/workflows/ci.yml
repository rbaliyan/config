name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Smoke tests
        run: go test -run '^TestSmoke|^Example' -timeout 60s ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race ./...

      # Per-package coverage gate over the unit-runnable set. Excludes the
      # service-backed backends (postgres/mongodb/etcd/redis) — those run with
      # real databases in the `integration` job — plus test-support packages.
      # Fails the build if any unit package regresses below COVER_MIN.
      - name: Coverage gate
        env:
          COVER_MIN: "75.0"
        run: |
          set -euo pipefail
          excluded='/postgres|/mongodb|/etcd|/redis|/internal/testutil|/internal/storetest'
          pkgs=$(go list ./... | grep -Ev "${excluded}")
          fail=0
          while read -r line; do
            case "${line}" in
              *"coverage:"*)
                pkg=$(echo "${line}" | awk '{print $2}')
                cov=$(echo "${line}" | sed -E 's/.*coverage: ([0-9.]+)%.*/\1/')
                echo "  ${pkg}: ${cov}%"
                awk -v p="${cov}" -v m="${COVER_MIN}" -v pk="${pkg}" \
                  'BEGIN { if (p+0 < m+0) { printf("  -> %s below %.1f%% gate\n", pk, m); exit 1 } }' \
                  || fail=1 ;;
            esac
          done < <(go test -cover ${pkgs})
          if [ "${fail}" -ne 0 ]; then
            echo "coverage gate FAILED (COVER_MIN=${COVER_MIN}%)"; exit 1
          fi
          echo "coverage gate PASSED (all unit packages >= ${COVER_MIN}%)"

  integration:
    name: Integration (mongo+postgres+sqlite)
    runs-on: ubuntu-latest
    needs: smoke
    # MongoDB is NOT a service container because mongo's change-stream tests
    # need `--replSet rs0` on the mongod CMD, and GHA service containers
    # cannot override an image's CMD. We start mongo manually via docker run.
    # PostgreSQL and Redis are fine as service containers. etcd is not wired as
    # a real backend here: the etcd store tests use an in-memory fake for unit
    # coverage and skip their ETCD_ENDPOINTS-gated integration cases.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: config_test
          POSTGRES_PASSWORD: config_test
          POSTGRES_DB: config_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U config_test -d config_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Start MongoDB replica set
        run: |
          set -euo pipefail
          # Start mongo with --replSet so rs.initiate() can promote it to a
          # single-node replica set. Bind to all interfaces so the runner
          # can reach it on localhost:27019.
          docker run -d --name mongo \
            -p 27019:27017 \
            mongo:6.0 --replSet rs0 --bind_ip_all

          # Wait for mongod to accept connections before initiating.
          for i in $(seq 1 30); do
            if docker exec mongo mongosh --quiet --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q "^1$"; then
              echo "mongod accepting connections"
              break
            fi
            sleep 1
          done

          # Initiate the replica set. Use the container's own hostname so the
          # primary advertises an address reachable from inside the container
          # (the test client connects through the host's port mapping with
          # directConnection=true, so the advertised address only needs to be
          # resolvable from within the container).
          docker exec mongo mongosh --quiet --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]})"

          # Wait for primary election.
          for i in $(seq 1 30); do
            if docker exec mongo mongosh --quiet --eval "rs.status().myState" 2>/dev/null | grep -q "^1$"; then
              echo "replica set primary elected"
              exit 0
            fi
            sleep 1
          done
          echo "replica set primary failed to elect within 30s"
          docker logs mongo | tail -50
          exit 1

      - name: Integration tests
        env:
          MONGO_URI: mongodb://localhost:27019/?directConnection=true
          POSTGRES_DSN: postgres://config_test:config_test@localhost:5433/config_test?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: go test -v -race -count=1 ./mongodb/... ./postgres/... ./sqlite/... ./redis/... ./etcd/...

      - name: Stop MongoDB
        if: always()
        run: docker rm -f mongo || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          args: --tests=false

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          category: "/language:go"
