name: ClusterFuzzLite PR

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  fuzz:
    name: Fuzz (PR)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          language: go
          sanitizer: address

      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c # v1
        with:
          mode: code-change
          fuzz-seconds: 90
          output-sarif: true

      - name: Upload SARIF
        if: always() && steps.run.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          sarif_file: cifuzz-sarif/results.sarif
          checkout_path: ${{ github.workspace }}
